# SECURITY: This workflow uses pull_request_target, which runs with the
# permissions of the BASE branch (not the fork). This is required because
# the CLA bot needs to:
#
#   1. Write CLA signatures to signatures/cla.json on the main branch
#      (contents: write).
#   2. Post comments on PRs with signing instructions (pull-requests: write).
#   3. Set commit statuses to block merge until the CLA is signed
#      (statuses: write).
#
# The workflow is safe against privilege escalation because:
#
#   - It does NOT check out PR code (no actions/checkout of the fork).
#   - The only action invoked (contributor-assistant/github-action) is
#     pinned to a full SHA and only reads PR metadata via the GitHub API.
#   - No user-controlled input is interpolated into shell commands.
#   - harden-runner audits all egress from the job.
#
# Downgrading contents to read would break CLA signature persistence.
# Ref: provii-crypto PC-391 applied the same documentation approach.

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Skip for Dependabot and Renovate PRs
    if: >-
      github.event_name == 'issue_comment' ||
      (github.event_name == 'pull_request_target' &&
       github.actor != 'dependabot[bot]' &&
       github.actor != 'renovate[bot]')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: CLA Assistant
        if: >-
          github.event.comment.body == 'recheck' ||
          github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'dependabot[bot],renovate[bot],github-actions[bot],tim-maelstrom'
          custom-notsigned-prcomment: >-
            Thank you for your pull request. Before we can review it, you need
            to sign our [Contributor Licence Agreement](https://github.com/${{ github.repository }}/blob/main/CLA.md).
            Please read the CLA and reply to this comment with the following
            statement to indicate your agreement:


            > I have read the CLA Document and I hereby sign the CLA
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
