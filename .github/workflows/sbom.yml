name: SBOM Generation

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/CODEOWNERS'
      - '.gitignore'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always

jobs:
  generate-sbom:
    name: Generate Software Bill of Materials
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Configure git for private dependencies
        env:
          GH_TOKEN: ${{ github.token }}
        run: git config --local url."https://x-access-token:${GH_TOKEN}@github.com/provii/".insteadOf "https://github.com/provii/"

      - name: Clone provii-crypto
        # WS-021: Clone at tag then verify SHA to detect tag mutation.
        run: |
          git clone --depth 1 --branch v0.1.0 https://github.com/provii/provii-crypto.git ../provii-crypto
          cd ../provii-crypto
          ACTUAL_SHA=$(git rev-parse HEAD)
          EXPECTED_SHA="2ee4691cff450979f9e0d01bc561bd5ff59f5bd9"
          if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
            echo "::error::provii-crypto tag v0.1.0 resolved to ${ACTUAL_SHA}, expected ${EXPECTED_SHA}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@b3b07ba8b418998c39fb20f53e8b695cdcc8de1b # stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "sbom"

      - name: Install cargo-sbom
        run: cargo install cargo-sbom --locked --version =0.10.0

      - name: Generate SBOM (CycloneDX)
        run: cargo sbom --output-format cyclone_dx_json_1_6 > sbom-cyclonedx.json

      - name: Generate SBOM (SPDX)
        run: cargo sbom --output-format spdx_json_2_3 > sbom-spdx.json

      - name: Validate SBOM files
        run: |
          jq empty sbom-cyclonedx.json
          jq empty sbom-spdx.json
          echo "SBOM files validated successfully"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90
